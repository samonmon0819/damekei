function statBox(k,v){return`<span><b>${k}</b><em>${v}</em></span>`}function pick(title,items,sel,key,view,act,compact=false){return`<section class="${compact?'compact ':''}"><div class="title">${title}</div><div class="reel">${items.map((x,i)=>`<button class="item ${key(x)===sel?'selected':''}" data-act="${act}" data-i="${i}">${view(x)}</button>`).join('')}</div></section>`}function sideUI(side){let s=S[side],p=gp(s.pokemonId),f=gf(p,s.formId);normalizeAbility(p,s);let e=ge(p,s.evRank),ac=actual(p,f,e,s),atk=side==='a';let badges=[];if(speedItem(s.itemName)!==1)badges.push(`S持ち物×${speedItem(s.itemName)}`);if(weatherSpeed(p,s)!==1)badges.push(`${activeAbility(p,s)}×2`);let m=megaInfo(p,s.formId);if(m&&m.abilityJa)badges.push('メガ特性');let mod=k=>s.stages[k]||k==='spe'&&(speedItem(s.itemName)!==1||weatherSpeed(p,s)!==1)||k==='def'&&F.weather==='snow'&&f.types.includes('ice')||k==='spd'&&F.weather==='sand'&&f.types.includes('rock')?' mod':'';return`<button class="head" data-act="${side}:open"><div><div class="eyebrow">${atk?'攻撃側':'防御側'}</div><h2>${esc(f.nameJa||p.nameJa)}</h2><p>No.${p.dexNo} / Rank ${p.rank}</p></div><img class="art" src="${art(p,f)}" onerror="fb(this,${p.dexNo})"><div><div class="types">${(f.types||[]).map(t=>`<span>${TJ[t]||t}</span>`).join('')}</div>${(p.forms||[]).length>1?`<button class="mega ${s.formId!=='normal'?'active':''}" data-act="${side}:mega">${s.formId==='normal'?'メガ':'通常'}</button>`:''}</div></button><div class="badges">${badges.map(x=>`<span class="badge">${esc(x)}</span>`).join('')}</div><div class="label">実数値</div><div class="stats"><span class="${mod('hp')}"><b>H</b><em>${ac.hp}</em></span><span class="${mod('atk')}"><b>A</b><em>${ac.atk}</em></span><span class="${mod('def')}"><b>B</b><em>${ac.def}</em></span><span class="${mod('spa')}"><b>C</b><em>${ac.spa}</em></span><span class="${mod('spd')}"><b>D</b><em>${ac.spd}</em></span><span class="${mod('spe')}"><b>S</b><em>${ac.spe}</em></span></div>${atk?pick('わざ',p.moves||[],s.moveName const TYPE_CHART={normal:{rock:.5,ghost:0,steel:.5},fire:{fire:.5,water:.5,grass:2,ice:2,bug:2,rock:.5,dragon:.5,steel:2},water:{fire:2,water:.5,grass:.5,ground:2,rock:2,dragon:.5},electric:{water:2,electric:.5,grass:.5,ground:0,flying:2,dragon:.5},grass:{fire:.5,water:2,grass:.5,poison:.5,ground:2,flying:.5,bug:.5,rock:2,dragon:.5,steel:.5},ice:{fire:.5,water:.5,grass:2,ice:.5,ground:2,flying:2,dragon:2,steel:.5},fighting:{normal:2,ice:2,poison:.5,flying:.5,psychic:.5,bug:.5,rock:2,ghost:0,dark:2,steel:2,fairy:.5},poison:{grass:2,poison:.5,ground:.5,rock:.5,ghost:.5,steel:0,fairy:2},ground:{fire:2,electric:2,grass:.5,poison:2,flying:0,bug:.5,rock:2,steel:2},flying:{electric:.5,grass:2,fighting:2,bug:2,rock:.5,steel:.5},psychic:{fighting:2,poison:2,psychic:.5,dark:0,steel:.5},bug:{fire:.5,grass:2,fighting:.5,poison:.5,flying:.5,psychic:2,ghost:.5,dark:2,steel:.5,fairy:.5},rock:{fire:2,ice:2,fighting:.5,ground:.5,flying:2,bug:2,steel:.5},ghost:{normal:0,psychic:2,ghost:2,dark:.5},dragon:{dragon:2,steel:.5,fairy:0},dark:{fighting:.5,psychic:2,ghost:2,dark:.5,fairy:.5},steel:{fire:.5,water:.5,electric:.5,ice:2,rock:2,steel:.5,fairy:2},fairy:{fire:.5,fighting:2,poison:.5,dragon:2,dark:2,steel:.5}};function typeEff(moveType,defTypes){return (defTypes||[]).reduce((a,t)=>a*((TYPE_CHART[moveType]||{})[t]??1),1)}function calc(){let ap=gp(S.a.pokemonId),dp=gp(S.d.pokemonId),af=gf(ap,S.a.formId),df=gf(dp,S.d.formId),m=gm(ap,S.a.moveName),ae=ge(ap,S.a.evRank),de=ge(dp,S.d.evRank),h=hazard(df.types||[]);if(!m.power||m.category==='status')return{min:0,max:0,moveMin:0,moveMax:0,haz:h*100,m,af,df};let ph=m.category==='physical',cat=ph?'physical':'special',burn=(ph&&F.burn)?.5:1,wall=(F.aurora||(ph&&F.reflect)||(!ph&&F.lightScreen))?.5:1,atk=Math.floor(stat(ph?af.baseStats.atk:af.baseStats.spa,ph?ae.atk:ae.spa,S.a.natureName,ph?'atk':'spa')*burn*statItem(S.a.itemName,cat,ap.id)*stg(S.a.stages[ph?'atk':'spa']||0)),def=Math.floor(stat(ph?df.baseStats.def:df.baseStats.spd,ph?de.def:de. function center(){let r=calc();function row(l,f){let d1=Math.round(r.min*f),d2=Math.round(r.max*f),p1=r.haz+r.moveMin*f,p2=r.haz+r.moveMax*f,rem=Math.max(0,100-p1),cls=rem<=20?' r':rem<=50?' y':'';return`<div class="row"><div class="label">${l}</div><div class="hp"><div class="fill${cls}" style="width:${rem}%"></div></div><div class="dmg">${d1} - ${d2}<div class="pct">${p1.toFixed(1)} - ${p2.toFixed(1)}%</div></div><em class="chip">${hit(p1,p2)}</em></div>`}return`<div class="movebox"><div class="mvline"><span>${esc(r.af.nameJa)} の</span><b>${esc(r.m.nameJa||'わざ未選択')}</b><span>→ ${esc(r.df.nameJa)}</span><small>相性 ×${typeEff(r.m.type,r.df.types||[]).toString()}</small></div></div>${row('通常',1)}${row('急所',1.5)}<div class="field-buttons"><button class="${F.reflect?'active':''}" data-cond="reflect">リフレクター</button><button class="${F.lightScreen?'active':''}" data-cond="lightScreen">光の壁</button><button class="aurora ${F.aurora?'active':''}" data-cond="aurora">オーロラベール</button><button class="burn ${F.burn?'active':''}" data-cond="burn">やけど</button></div><div class="weather-buttons"><button class="${F.weather==='sun'?'active':''}" data-weather="sun">晴れ</button><button class="${F.weather==='rain'?'active':''}" data-weather="rain">雨</button><button class="${F.weather==='sand'?'active':''}" data-weather="sand">砂</button><button class="${F.weather==='snow'?'active':''}" data-weather="snow">雪</button></div><div class="hazard-buttons"><button class="${F.rocks?'active':''}" data-hazard="rocks">ステロ ${F.rocks?'ON':'OFF'}</button><button class="${F.spikes?'active':''}" data-hazard="spikes">まきびし ${F.spikes}</button></div><div class="note">天候:${{none:'なし',sun:'晴れ',rain:'雨',sand:'砂',snow:'雪'}[F.weather]} / 定数ダメ:${r.haz.toFixed(1)}%</div><button class="swap" data-swap="1">攻守入れ替え</button>`}
function render(){a.innerHTML=sideUI('a');d.innerHTML=sideUI('d');c.innerHTML=center()}function openM(s){modalSide=s;mt.textContent=(s==='a'?'攻撃側':'防御側')+'のポケモンを選択';q.value='';modal.classList.add('open');draw('')}function draw(v){let qn=kana(v);pg.innerHTML=P.filter(p=>!qn||kana([p.nameJa,p.rank,p.dexNo,(p.types||[]).map(t=>TJ[t]||t).join(' '),p.id].join(' ')).includes(qn)).map(p=>`<button class="pcard ${p.id===S[modalSide].pokemonId?'selected':''}" data-p="${p.id}"><img src="${art(p,p.forms[0])}" onerror="fb(this,${p.dexNo})"><span><b>${esc(p.nameJa)}</b><span>Rank ${p.rank} / No.${p.dexNo}</span></span></button>`).join('')}document.addEventListener('click',e=>{let sw=e.target.closest('[data-swap]');if(sw){let tmp=S.a;S.a=S.d;S.d=tmp;render();return}let cond=e.target.closest('[data-cond]');if(cond){F[cond.dataset.cond]=!F[cond.dataset.cond];render();return}let w=e.target.closest('[data-weather]');if(w){let val=w.dataset.weather;F.weather=F.weather===val?'none':val;render();return}let hz=e.target.closest('[data-hazard]');if(hz){if(hz.dataset.hazard==='rocks')F.rocks=!F.rocks;else F.spikes=(F.spikes+1)%4;render();return}if(e.target.closest('[data-close]')){modal.classList.remove('open');return}let pp=e.target.closest('[data-p]');if(pp){S[modalSide]=init(gp(pp.dataset.p));modal.classList.remove('open');render();return}if(e.target.id==='modal'){modal.classList.remove('open');return}let b=e.target.closest('[data-act]');if(!b)return;let [side,act]=b.dataset.act.split(':'),s=S[side],p=gp(s.pokemonId),i=+b.dataset.i;if(act==='open'){openM(side);return}if(act==='mega'){let fs=p.forms||[],idx=fs.findIndex(f=>f.formId===s.formId);s.formId=fs[(idx+1)%fs.length].formId;normalizeAbility(p,s)}if(act==='move')s.moveName=p.moves[i].nameJa;if(act==='item')s.itemName=(p.top3Items||[])[i].nameJa;if(act==='nature')s.natureName=(p.natures||[])[i].nameJa;if(act==='ability')s.abilityName=(abilityList(p,s)||[])[i].nameJa;if(act==='ev')s.evRank=(p.evSpreads||[])[i].rank;if(act==='down'){let
